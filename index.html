<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMX / USDT Trading Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b0f;--bg2:#0d1117;--bg3:#131920;
  --border:#1a2840;--border2:#253650;
  --green:#00e676;--red:#ff3d57;--blue:#2196f3;--gold:#ffd600;
  --blue-dim:#0a1828;
  --text:#dce8f5;--text2:#7a96b2;--text3:#3a5570;
  --mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--ui);width:100%;overflow-x:hidden}
.app{display:flex;flex-direction:column;width:100%;min-height:100vh;background:var(--bg)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;flex-direction:column;gap:1px}
.tb-pair{font-size:16px;font-weight:600;letter-spacing:1px;color:var(--text)}
.tb-price{font-family:var(--mono);font-size:22px;color:var(--green);font-weight:600;transition:color 0.15s}
.tb-price.flash-up{color:#00ff99}.tb-price.flash-dn{color:#88ffcc}
.tb-chg{font-size:11px;font-family:var(--mono);margin-top:1px;color:var(--green)}
.tb-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.tb-badge-live{background:var(--blue-dim);color:var(--blue);font-size:9px;padding:2px 7px;border-radius:2px;font-family:var(--mono);border:1px solid var(--border2)}
.tb-stats{display:flex;gap:14px;margin-top:2px}
.tb-stat{display:flex;flex-direction:column;align-items:flex-end;font-size:9px}
.tb-slbl{color:var(--text3)}
.tb-sval{font-family:var(--mono);font-size:10px;color:var(--text2)}
.tf-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:6px 12px;gap:6px}
.tf-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:2px;flex:1;cursor:pointer}
.tf-btn.on{background:var(--blue-dim);color:var(--blue);border-color:var(--blue)}
.chart-wrap{position:relative;width:100%;background:var(--bg)}
canvas#cc{display:block;width:100%}
.stats-row{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.stat-cell{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.sc-lbl{font-size:9px;color:var(--text3);font-family:var(--mono)}
.sc-val{font-family:var(--mono);font-size:12px;color:var(--text2)}
.balance-card{background:var(--bg2);margin:10px 12px;border-radius:6px;border:1px solid var(--border2);padding:14px 16px}
.bc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.bc-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.bc-crypto{font-family:var(--mono);font-size:13px;color:var(--text2)}
.bc-total{font-family:var(--mono);font-size:30px;color:var(--green);font-weight:600;transition:color 0.3s}
.bc-total.pulse{color:#00ff99}
.bc-sub{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px}
.serial-card{background:var(--bg2);margin:0 12px 10px;border-radius:6px;border:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.sc2-blk{display:flex;flex-direction:column;gap:3px}
.sc2-lbl{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.sc2-num{font-family:var(--mono);font-size:22px;color:var(--gold);font-weight:600;letter-spacing:2px}
.sc2-cur{font-family:var(--mono);font-size:18px;color:var(--blue);letter-spacing:1px}
.sc2-div{width:1px;height:50px;background:var(--border)}
.ob-card{background:var(--bg2);margin:0 12px 12px;border-radius:6px;border:1px solid var(--border);overflow:hidden}
.ob-hdr{padding:7px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;display:flex;justify-content:space-between}
.ob-cols{display:flex}
.ob-col{flex:1;overflow:hidden}
.ob-col:first-child{border-right:1px solid var(--border)}
.ob-col-hdr{padding:4px 8px;font-size:9px;color:var(--text3);font-family:var(--mono);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.ob-r{display:flex;justify-content:space-between;padding:2px 8px;font-family:var(--mono);font-size:10px;position:relative}
.ob-r .bg{position:absolute;top:0;right:0;height:100%;opacity:0.12;border-radius:1px}
.ob-r.s .bg{background:var(--red)}.ob-r.b .bg{background:var(--green)}
.ob-r.s .p{color:var(--red)}.ob-r.b .p{color:var(--green)}
.ob-r .sz{color:var(--text3);font-size:9px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-pair">IMX / USDT</div>
      <div class="tb-price" id="tb-p">$0.1400</div>
      <div class="tb-chg" id="tb-chg">▲ +$0.0000 (+0.00%)</div>
    </div>
    <div class="tb-right">
      <div style="display:flex;gap:6px">
        <span class="tb-badge-live">● LIVE</span>
      </div>
      <div class="tb-stats">
        <div class="tb-stat"><div class="tb-slbl">HIGH</div><div class="tb-sval" id="tb-hi">$0.1400</div></div>
        <div class="tb-stat"><div class="tb-slbl">LOW</div><div class="tb-sval" id="tb-lo">$0.1400</div></div>
        <div class="tb-stat"><div class="tb-slbl">VOL</div><div class="tb-sval">1.62M</div></div>
      </div>
    </div>
  </div>

  <div class="tf-bar">
    <button class="tf-btn" onclick="switchTF('15m',this)">15m</button>
    <button class="tf-btn on" onclick="switchTF('1h',this)">1H</button>
    <button class="tf-btn" onclick="switchTF('4h',this)">4H</button>
    <button class="tf-btn" onclick="switchTF('1d',this)">1D</button>
  </div>

  <div class="chart-wrap" id="cw">
    <canvas id="cc"></canvas>
  </div>

  <div class="stats-row">
    <div class="stat-cell"><div class="sc-lbl">PRICE</div><div class="sc-val" id="st-p">$0.1400</div></div>
    <div class="stat-cell"><div class="sc-lbl">24H CHG</div><div class="sc-val" id="st-c" style="color:var(--green)">+0.00%</div></div>
    <div class="stat-cell"><div class="sc-lbl">MKT CAP</div><div class="sc-val" id="st-mc">—</div></div>
  </div>

  <div class="balance-card">
    <div class="bc-row">
      <div class="bc-lbl">PORTFOLIO VALUE</div>
      <div class="bc-crypto" id="b-hold">165.82 IMX</div>
    </div>
    <div class="bc-total" id="b-usd">$0.0000</div>
    <div class="bc-sub" id="b-sub">@ $0.1400 per IMX</div>
  </div>

  <div class="serial-card">
    <div class="sc2-blk">
      <div class="sc2-lbl">YOUR SERIAL NUMBER</div>
      <div class="sc2-num">5013</div>
    </div>
    <div class="sc2-div"></div>
    <div class="sc2-blk" style="align-items:flex-end">
      <div class="sc2-lbl">CURRENT SERIAL</div>
      <div class="sc2-cur" id="cur-serial">0</div>
    </div>
  </div>

  <div class="ob-card">
    <div class="ob-hdr"><span>ORDER BOOK</span><span id="ob-m" style="color:var(--green)">$0.1400</span></div>
    <div class="ob-cols">
      <div class="ob-col">
        <div class="ob-col-hdr"><span>SELL</span><span>SIZE</span></div>
        <div id="ob-s"></div>
      </div>
      <div class="ob-col">
        <div class="ob-col-hdr"><span>BUY</span><span>SIZE</span></div>
        <div id="ob-b"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG
//  শুরু: $0.07 | প্রতিদিন +$0.01 | সর্বোচ্চ $1.00
//  সব ডিভাইসে UTC-synced — একই second = একই price
// ============================================================
const HOLDINGS    = 699.82;
const DAY_ZERO    = new Date('2026-06-19T00:00:00Z');
const START_PRICE = 1.90;    // প্রথম দিনের price
const PRICE_PER_DAY = 0.01; // প্রতিদিন এতটুকু বাড়ে
const MAX_PRICE   = 10.00;

function getDayNum() {
  return Math.max(0, Math.floor((Date.now() - DAY_ZERO.getTime()) / 86400000));
}

function getBasePrice() {
  const p = START_PRICE + getDayNum() * PRICE_PER_DAY;
  return Math.min(p, MAX_PRICE);
}

// Deterministic RNG — একই UTC second → সব device-এ identical
function seededRng(seed) {
  let s = (seed >>> 0) + 0x6D2B79F5;
  let t = Math.imul(s ^ s >>> 15, 1 | s);
  t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

// Noise: ±$0.0003 (tiny, যাতে uptrend ঠিক থাকে)
function getLivePrice() {
  const slot  = Math.floor(Date.now() / 1000);
  const noise = (seededRng(slot) - 0.5) * 0.0006;
  return Math.min(MAX_PRICE, Math.max(START_PRICE, getBasePrice() + noise));
}

function getPrevPrice() {
  const slot  = Math.floor(Date.now() / 1000) - 1;
  const noise = (seededRng(slot) - 0.5) * 0.0006;
  return Math.min(MAX_PRICE, Math.max(START_PRICE, getBasePrice() + noise));
}

let currentTF = '1h';
const candleData = [];
const tfSecs  = {'15m':900,'1h':3600,'4h':14400,'1d':86400};
const tfCount = {'15m':72,'1h':48,'4h':36,'1d':30};

function tfHash(tf) {
  let h = 0;
  for (let i = 0; i < tf.length; i++) h = (Math.imul(31, h) + tf.charCodeAt(i)) | 0;
  return h;
}

// সব candle GREEN only — close সবসময় > open
function seedCandles(tf) {
  candleData.length = 0;
  const s   = tfSecs[tf];
  const cnt = tfCount[tf];
  const nowSec    = Math.floor(Date.now() / 1000);
  const slotNow   = Math.floor(nowSec / s) * s;
  const dayZeroSec = Math.floor(DAY_ZERO.getTime() / 1000);

  for (let i = 0; i < cnt; i++) {
    const slotTime = slotNow - (cnt - i) * s;
    const daysIn   = Math.max(0, (slotTime - dayZeroSec) / 86400);
    const baseP    = Math.min(MAX_PRICE, START_PRICE + daysIn * PRICE_PER_DAY);

    const seed = (Math.abs(slotTime) + Math.abs(tfHash(tf))) >>> 0;
    const r1 = seededRng(seed);
    const r2 = seededRng(seed + 1);
    const r3 = seededRng(seed + 2);
    const r4 = seededRng(seed + 3);

    // body range: proportional to timeframe size
    const bodyRange = PRICE_PER_DAY * (s / 86400) * 0.5;

    // open থেকে close সবসময় উপরে (green candle)
    const o = Math.max(START_PRICE, baseP - bodyRange * 0.3 * r1);
    const c = Math.min(MAX_PRICE, Math.max(o + 0.00001, baseP + bodyRange * 0.3 * r2));

    const h  = Math.min(MAX_PRICE, c + r3 * bodyRange * 0.25);
    const l2 = Math.max(START_PRICE, o - r4 * bodyRange * 0.15);

    candleData.push({ t: slotTime, o, h, l: l2, c });
  }

  // শেষ candle = live price
  const lp = getLivePrice();
  if (candleData.length) {
    const last = candleData[candleData.length - 1];
    last.c = Math.max(last.o + 0.00001, lp);
    if (last.c > last.h) last.h = last.c;
  }
}

function updateLastCandle(price) {
  if (!candleData.length) return;
  const last = candleData[candleData.length - 1];
  const now  = Math.floor(Date.now() / 1000);
  if (now - last.t >= tfSecs[currentTF]) {
    const o2 = last.c;
    const c2 = Math.max(o2 + 0.00001, price);
    candleData.push({ t: now, o: o2, h: c2, l: o2 * 0.9999, c: c2 });
    if (candleData.length > 90) candleData.shift();
  } else {
    last.c = Math.max(last.o + 0.00001, price); // সবসময় green
    if (last.c > last.h) last.h = last.c;
  }
}

function drawChart() {
  const canvas = document.getElementById('cc');
  const wrap   = document.getElementById('cw');
  const W = wrap.offsetWidth;
  const H = Math.round(W * 0.60);
  canvas.width = W; canvas.height = H;
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (candleData.length < 2) return;

  const pL=58, pR=64, pT=14, pB=26;
  const cW = W - pL - pR, cH = H - pT - pB;

  // Y-axis range
  let minP = Infinity, maxP = -Infinity;
  candleData.forEach(c => {
    if (c.l < minP) minP = c.l;
    if (c.h > maxP) maxP = c.h;
  });
  const pad = (maxP - minP) * 0.10 || 0.002;
  minP = Math.max(START_PRICE - pad, 0);
  maxP = Math.min(maxP + pad, MAX_PRICE + pad);

  const pRng = maxP - minP || 0.01;
  const toY   = p => pT + (1 - (p - minP) / pRng) * cH;
  const n    = candleData.length;
  const slotW = cW / n;
  const bW    = Math.max(1.5, slotW * 0.68);

  // Horizontal grid
  ctx.strokeStyle = '#111820'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y  = pT + (cH / 5) * i;
    const pv = maxP - (pRng / 5) * i;
    ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(pL + cW, y); ctx.stroke();
    ctx.fillStyle = '#3a5570';
    ctx.font = '9px Share Tech Mono,monospace';
    ctx.textAlign = 'right';
    ctx.fillText('$' + pv.toFixed(4), pL - 4, y + 3);
  }

  // Vertical grid + time labels
  ctx.strokeStyle = '#0e1620'; ctx.lineWidth = 0.5;
  const vStep = Math.max(1, Math.floor(n / 6));
  for (let i = 0; i < n; i += vStep) {
    const x = pL + i * slotW + slotW / 2;
    ctx.beginPath(); ctx.moveTo(x, pT); ctx.lineTo(x, pT + cH); ctx.stroke();
    const d   = new Date(candleData[i].t * 1000);
    const lbl = currentTF === '1d'
      ? (d.getUTCMonth()+1) + '/' + d.getUTCDate()
      : d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0');
    ctx.fillStyle = '#3a5570';
    ctx.font = '8px Share Tech Mono,monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lbl, x, pT + cH + 16);
  }

  // সব candle শুধু GREEN
  candleData.forEach((c, i) => {
    const x = pL + i * slotW + slotW / 2;
    const bodyT = toY(Math.max(c.o, c.c));
    const bodyB = toY(Math.min(c.o, c.c));
    const bH    = Math.max(1.5, bodyB - bodyT);

    // wick
    ctx.strokeStyle = '#00e676'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, toY(c.h)); ctx.lineTo(x, toY(c.l)); ctx.stroke();

    // body
    ctx.fillStyle = 'rgba(0,230,118,0.22)';
    ctx.fillRect(x - bW/2, bodyT, bW, bH);
    ctx.strokeStyle = '#00e676'; ctx.lineWidth = 0.9;
    ctx.strokeRect(x - bW/2, bodyT, bW, bH);
  });

  // Live price dashed line + label
  const lp = getLivePrice();
  const ly = toY(lp);
  ctx.setLineDash([3,4]); ctx.strokeStyle = 'rgba(0,230,118,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pL, ly); ctx.lineTo(pL + cW, ly); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#00e676';
  ctx.fillRect(pL + cW + 1, ly - 9, pR - 2, 18);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 9px Share Tech Mono,monospace';
  ctx.textAlign = 'center';
  ctx.fillText('$' + lp.toFixed(4), pL + cW + 1 + (pR - 2) / 2, ly + 3);
}

function updateOB(mid) {
  const slot = Math.floor(Date.now() / 3000);
  const rowsS = [], rowsB = [];
  for (let i = 6; i >= 1; i--) {
    const r1  = seededRng(slot * 100 + i * 7 + 1);
    const r2  = seededRng(slot * 100 + i * 7 + 2);
    const off = i * (0.0003 + r1 * 0.0002);
    const sz  = Math.floor(r2 * 8000 + 500);
    rowsS.push({ p: (mid + off).toFixed(4), sz: sz.toLocaleString(), w: (sz / 8500 * 100).toFixed(0) });
  }
  for (let i = 1; i <= 6; i++) {
    const r1  = seededRng(slot * 100 + i * 13 + 50);
    const r2  = seededRng(slot * 100 + i * 13 + 51);
    const off = i * (0.0003 + r1 * 0.0002);
    const sz  = Math.floor(r2 * 8000 + 500);
    rowsB.push({ p: (mid - off).toFixed(4), sz: sz.toLocaleString(), w: (sz / 8500 * 100).toFixed(0) });
  }
  document.getElementById('ob-s').innerHTML = rowsS.map(r =>
    `<div class="ob-r s"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`
  ).join('');
  document.getElementById('ob-b').innerHTML = rowsB.map(r =>
    `<div class="ob-r b"><div class="bg" style="width:${r.w}%"></div><span class="p">${r.p}</span><span class="sz">${r.sz}</span></div>`
  ).join('');
}

function fmt(p) { return '$' + p.toFixed(4); }

function updateUI() {
  const p    = getLivePrice();
  const prev = getPrevPrice();
  const pStr = fmt(p);

  // Topbar price flash
  const tb = document.getElementById('tb-p');
  tb.textContent = pStr;
  tb.className = 'tb-price ' + (p >= prev ? 'flash-up' : 'flash-dn');
  setTimeout(() => { tb.className = 'tb-price'; }, 200);

  // সব জায়গায় একই price
  document.getElementById('st-p').textContent  = pStr;
  document.getElementById('ob-m').textContent  = pStr;

  // 24h change: আজকের base vs গতকালের base
  const todayBase = Math.min(MAX_PRICE, START_PRICE + getDayNum() * PRICE_PER_DAY);
  const yestBase  = Math.min(MAX_PRICE, START_PRICE + Math.max(0, getDayNum() - 1) * PRICE_PER_DAY);
  const chg = p - yestBase;
  const pct = yestBase > 0 ? (chg / yestBase * 100).toFixed(2) : '0.00';
  document.getElementById('tb-chg').textContent = '▲ +' + fmt(chg) + ' (+' + pct + '%)';
  document.getElementById('st-c').textContent   = '+' + pct + '%';
  document.getElementById('st-c').style.color   = 'var(--green)';

  // High / Low (আজকের range)
  document.getElementById('tb-hi').textContent = fmt(Math.min(MAX_PRICE, todayBase + 0.0003));
  document.getElementById('tb-lo').textContent = fmt(Math.max(START_PRICE, todayBase - 0.0002));

  // Market cap
  document.getElementById('st-mc').textContent = '$' + (165820000 * p / 1e9).toFixed(4) + 'B';

  // Portfolio — price সব জায়গায় same
  const total = HOLDINGS * p;
  const balEl = document.getElementById('b-usd');
  balEl.textContent = '$' + total.toFixed(4);
  balEl.className = 'bc-total pulse';
  setTimeout(() => { balEl.className = 'bc-total'; }, 300);
  document.getElementById('b-sub').textContent  = '@ ' + pStr + ' per IMX';
  document.getElementById('b-hold').textContent = HOLDINGS.toFixed(2) + ' IMX';

  updateOB(p);
}

window.switchTF = function(tf, btn) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  seedCandles(tf);
  drawChart();
};

function tick() {
  updateLastCandle(getLivePrice());
  updateUI();
  drawChart();
}

seedCandles('1h');
updateUI();
drawChart();
setInterval(tick, 1000);
window.addEventListener('resize', drawChart);
</script>
</body>
</html>
